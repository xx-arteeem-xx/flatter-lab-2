name: Build & Release Signed APK

on:
  push:
    branches: [ main ]

# GITHUB_TOKEN needs write access to create releases
permissions:
  contents: write

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 (required by Gradle 8.6 / AGP 8.3) ────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Flutter 3.24.5 stable ─────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── 4. Generate missing Android binary files ──────────────────────────
      # flutter create . fills in gradle-wrapper.jar, mipmap icons, gradlew
      # without overwriting our committed custom files (build.gradle, etc.)
      - name: Generate Android boilerplate (missing binary files)
        run: |
          flutter create . --platforms android --project-name flatter_lab_2
          rm -f android/app/build.gradle.kts

      # ── 5. Make gradlew executable ────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 6. Decode keystore from GitHub Secret ─────────────────────────────
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/keystore.jks

      # ── 7. Create key.properties from secrets ─────────────────────────────
      - name: Create key.properties
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=../keystore.jks\n' \
            "${{ secrets.KEY_STORE_PASSWORD }}" \
            "${{ secrets.KEY_PASSWORD }}" \
            "${{ secrets.KEY_ALIAS }}" \
            > android/key.properties

      # ── 8. Install pub dependencies ───────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 9. Static analysis ────────────────────────────────────────────────
      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos

      # ── 10. Unit & widget tests ───────────────────────────────────────────
      - name: Flutter test
        run: flutter test

      # ── 11. Build signed release APK ─────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release

      # ── 12. Rename APK for stable download URL ────────────────────────────
      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk app-release.apk

      # ── 13. Publish to GitHub Releases ────────────────────────────────────
      # Stable URL: /releases/latest/download/app-release.apk
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v1.0.${{ github.run_number }}" \
            app-release.apk \
            --title "Release v1.0.${{ github.run_number }}" \
            --notes "$(printf 'Автоматическая сборка из коммита %s\n\n**Скачать APK:** [app-release.apk](https://github.com/${{ github.repository }}/releases/latest/download/app-release.apk)' '${{ github.sha }}')"
