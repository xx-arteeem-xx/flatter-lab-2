name: flatter_lab_2
description: Лабораторная работа №2 — Flutter UI «Профиль пользователя» — Фирсов Артем
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Font — Nunito (closest Google Fonts match to Trebuchet MS from EAM design system)
  google_fonts: ^6.2.1

  # Gallery — cached network images (picsum.photos)
  cached_network_image: ^3.3.1

  # URL launching — VK, TG, GitHub, tel: scheme
  url_launcher: ^6.3.0

  # PDF resume — open from temp dir via platform intent
  open_filex: ^4.4.1
  path_provider: ^2.1.3

  # Like counter + theme preference persistence
  shared_preferences: ^2.2.3

  # Gallery fullscreen pinch/zoom viewer
  photo_view: ^0.14.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "user-files/logo.png"
  adaptive_icon_background: "#080A11"
  adaptive_icon_foreground: "user-files/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - user-files/
